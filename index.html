<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Dragon Game</title>
  <link rel="icon" type="image/png" href="assets/dragon_game_logo_scaled.png" />
  <link rel="stylesheet" href="src/style.css" />
</head>
<body>

  <nav>
    <span class="nav-logo">My Dragon Game</span>
    <ul class="nav-links">
      <li><a href="index.html" class="active">Home</a></li>
      <li><a href="feedback.html">Feedback</a></li>
    </ul>
  </nav>

  <!-- Full-viewport slideshow -->
  <section class="slideshow" id="slideshow">

    <div class="slide active">
      <img src="assets/imgs/1_my_dragon_game_ss.png" alt="Screenshot 1" />
    </div>
    <div class="slide">
      <img src="assets/imgs/2_my_dragon_game_ss.png" alt="Screenshot 2" />
    </div>
    <div class="slide">
      <img src="assets/imgs/4_my_dragon_game_ss.png" alt="Screenshot 4" />
    </div>
    <div class="slide">
      <img src="assets/imgs/5_my_dragon_game_ss.png" alt="Screenshot 5" />
    </div>
    <div class="slide">
      <img src="assets/imgs/6_my_dragon_game_ss.png" alt="Screenshot 6" />
    </div>
    <div class="slide">
      <img src="assets/imgs/8_my_dragon_game_ss.png" alt="Screenshot 8" />
    </div>
    <div class="slide">
      <img src="assets/imgs/9_my_dragon_game_ss.png" alt="Screenshot 9" />
    </div>

    <!-- Left / right arrows -->
    <button class="slide-arrow prev" id="prev" aria-label="Previous screenshot">&#8249;</button>
    <button class="slide-arrow next" id="next" aria-label="Next screenshot">&#8250;</button>

    <!-- Dot indicators -->
    <div class="slide-dots" id="dots"></div>

    <!-- Download buttons overlaid on image -->
    <div class="slide-downloads">
      <a class="btn btn-primary" href="https://drive.google.com/uc?export=download&id=1D6ByUeDAejw7xzkYqlGksZBDht_IHM50" target="_blank" rel="noopener">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
        </svg>
        Download for Mac
      </a>
      <a class="btn btn-secondary" href="https://drive.google.com/uc?export=download&id=1wsgHYlx3aNACh6zct5GYOMgkXj4qcVSm" target="_blank" rel="noopener">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M3 5.557L10.333 4.5V11.5H3V5.557zM11.167 4.38L21 3v8.5h-9.833V4.38zM3 12.5h7.333V19.5L3 18.443V12.5zM11.167 12.5H21V21l-9.833-1.38V12.5z"/>
        </svg>
        Download for Windows
      </a>
    </div>

  </section>

  <!-- Lightbox -->
  <div id="lightbox" role="dialog" aria-modal="true" aria-label="Image preview">
    <button id="lightbox-close" aria-label="Close">&times;</button>
    <img id="lightbox-img" src="" alt="" />
  </div>


  <script>
    /* ── Slideshow ─────────────────────────────────────────── */
    const slides    = Array.from(document.querySelectorAll('.slide'));
    const dotsWrap  = document.getElementById('dots');
    const INTERVAL  = 4000;
    let current     = 0;
    let timer;

    // Build dots
    slides.forEach((_, i) => {
      const d = document.createElement('button');
      d.className = 'slide-dot' + (i === 0 ? ' active' : '');
      d.setAttribute('aria-label', `Go to screenshot ${i + 1}`);
      d.addEventListener('click', () => go(i));
      dotsWrap.appendChild(d);
    });

    function getDots() { return Array.from(dotsWrap.querySelectorAll('.slide-dot')); }

    function go(index) {
      slides[current].classList.remove('active');
      getDots()[current].classList.remove('active');
      current = (index + slides.length) % slides.length;
      slides[current].classList.add('active');
      getDots()[current].classList.add('active');
    }

    function startTimer() {
      clearInterval(timer);
      timer = setInterval(() => go(current + 1), INTERVAL);
    }

    document.getElementById('prev').addEventListener('click', () => { go(current - 1); startTimer(); });
    document.getElementById('next').addEventListener('click', () => { go(current + 1); startTimer(); });

    startTimer();

    /* ── Lightbox ──────────────────────────────────────────── */
    const gallery  = document.getElementById('gallery');
    const lightbox = document.getElementById('lightbox');
    const lbImg    = document.getElementById('lightbox-img');
    const lbClose  = document.getElementById('lightbox-close');

    gallery.addEventListener('click', e => {
      const img = e.target.closest('.gallery-item img');
      if (!img) return;
      lbImg.src = img.src;
      lbImg.alt = img.alt;
      lightbox.classList.add('open');
    });

    function closeLb() { lightbox.classList.remove('open'); }
    lbClose.addEventListener('click', closeLb);
    lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLb(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLb(); });
  </script>

</body>
</html>
