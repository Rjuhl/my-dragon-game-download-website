<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feedback — My Dragon Game</title>
  <link rel="stylesheet" href="src/style.css" />
</head>
<body>

  <nav>
    <span class="nav-logo">My Dragon Game</span>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <!-- TODO: restore once Google Form is set up: <li><a href="feedback.html" class="active">Feedback</a></li> -->
      <li><span class="nav-coming-soon">Feedback (coming soon)</span></li>
    </ul>
  </nav>

  <div class="feedback-wrap">
    <h1>Bug Reports & Feedback</h1>
    <p class="sub">Found a bug or have an idea? Fill out the form below and it'll go straight to the team.</p>

    <!--
      SETUP: Create a free Google Form at https://forms.google.com
      then replace YOUR_GOOGLE_FORM_ID below with your form's ID.
      The ID is the long string in your form's edit URL:
        https://docs.google.com/forms/d/YOUR_GOOGLE_FORM_ID/edit
    -->

    <div id="form-placeholder" style="text-align:center; padding: 2rem 0;">
      <p style="color:var(--muted); margin-bottom:1.5rem; font-size:.95rem;">
        Submissions are handled via Google Forms — click below to open the form.
      </p>
      <a
        id="gform-link"
        class="btn btn-primary"
        href="https://docs.google.com/forms/d/YOUR_GOOGLE_FORM_ID/viewform"
        target="_blank"
        rel="noopener"
        style="font-size:1rem; padding:.85rem 2rem;"
      >
        Open Feedback Form &rarr;
      </a>
      <p style="color:var(--muted); font-size:.78rem; margin-top:1rem;">Opens in a new tab</p>
    </div>

    <!--
      OPTIONAL EMBED: Once you have your Google Form URL, you can also embed it
      directly by uncommenting the block below and replacing YOUR_GOOGLE_FORM_ID.
      Remove the form-placeholder div above if you use the embed.
    -->
    <!--
    <iframe
      src="https://docs.google.com/forms/d/e/YOUR_GOOGLE_FORM_ID/viewform?embedded=true"
      width="100%"
      height="800"
      frameborder="0"
      marginheight="0"
      marginwidth="0"
      style="border-radius:8px; border:1px solid var(--border); margin-top:1rem;"
    >Loading…</iframe>
    -->
  </div>

  <footer>
    <p><a href="index.html">&larr; Back to home</a></p>
  </footer>

</body>
</html>
